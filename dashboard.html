<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — mooncanvas</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./config.js"></script>
</head>
<body>

<header class="site-header">
  <a class="brand" href="/">
    <span class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="mb" cx="38%" cy="32%" r="62%"><stop offset="0%" stop-color="#fef0a0"/><stop offset="30%" stop-color="#e8c048"/><stop offset="65%" stop-color="#c49028"/><stop offset="88%" stop-color="#8a5c10"/><stop offset="100%" stop-color="#5a3508"/></radialGradient><radialGradient id="mt" cx="115%" cy="50%" r="75%"><stop offset="0%" stop-color="rgba(0,0,0,0.45)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></radialGradient></defs><circle cx="20" cy="20" r="18" fill="url(#mb)"/><circle cx="20" cy="20" r="18" fill="url(#mt)"/><circle cx="13" cy="12" r="4.8" fill="rgba(0,0,0,0.22)"/><circle cx="13" cy="12" r="3.8" fill="rgba(80,45,5,0.2)"/><path d="M10.2,9.2 A3.8,3.8 0 0 1 15.8,9.2" fill="none" stroke="rgba(255,240,140,0.45)" stroke-width="0.7"/><circle cx="26" cy="17" r="3.2" fill="rgba(0,0,0,0.18)"/><circle cx="26" cy="17" r="2.4" fill="rgba(80,45,5,0.15)"/><path d="M23.6,14.6 A2.4,2.4 0 0 1 28.4,14.6" fill="none" stroke="rgba(255,240,140,0.35)" stroke-width="0.6"/><circle cx="13" cy="26" r="2.3" fill="rgba(0,0,0,0.15)"/><circle cx="13" cy="26" r="1.6" fill="rgba(80,45,5,0.12)"/><circle cx="22" cy="27" r="1.4" fill="rgba(0,0,0,0.12)"/><circle cx="19" cy="15" r="0.9" fill="rgba(0,0,0,0.1)"/><circle cx="28" cy="25" r="1.1" fill="rgba(0,0,0,0.1)"/><circle cx="20" cy="20" r="18" fill="none" stroke="rgba(40,20,3,0.55)" stroke-width="3"/></svg>
    </span>
    <svg class="brand-name" viewBox="0 0 240 62" aria-label="mooncanvas">
      <defs>
        <path id="mc-arc" d="M4,42 C90,39 160,37 236,40"/>
        <linearGradient id="mc-gld" x1="0" y1="0" x2="240" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#b8922e"/>
          <stop offset="50%"  stop-color="#f5e49a"/>
          <stop offset="100%" stop-color="#b8922e"/>
        </linearGradient>
      </defs>
      <text font-family="'Pinyon Script', cursive" font-size="38" fill="url(#mc-gld)">
        <textPath href="#mc-arc">mooncanvas</textPath>
      </text>
    </svg>
  </a>
  <nav class="nav-links">
    <a href="/playground.html">Playground</a>
    <a href="/pricing.html">Pricing</a>
    <a href="/dashboard.html" id="nav-dashboard" class="nav-active">Dashboard</a>
    <a href="/auth.html" id="nav-signin" hidden>Sign In</a>
    <span class="nav-credits" id="nav-credits" hidden></span>
    <div id="nav-user-mount"></div>
  </nav>
</header>

<main class="dashboard-page" id="dashMain" hidden>

  <!-- Stats row -->
  <div class="dash-stats">
    <div class="stat-card">
      <span class="stat-label">Credits</span>
      <span class="stat-value" id="stat-credits">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Plan</span>
      <span class="stat-value" id="stat-plan">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Renews</span>
      <span class="stat-value" id="stat-renew">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Videos Generated</span>
      <span class="stat-value" id="stat-total">—</span>
    </div>
  </div>

  <!-- Billing actions -->
  <div class="dash-section">
    <div class="dash-section-header">
      <h2>Billing</h2>
      <div class="dash-section-actions">
        <button class="button secondary small" id="btn-upgrade" hidden>Upgrade Plan</button>
        <button class="button secondary small" id="btn-portal">Manage Subscription</button>
      </div>
    </div>
  </div>

  <!-- Job history -->
  <div class="dash-section">
    <div class="dash-section-header">
      <h2>Recent Videos</h2>
      <a href="/playground.html" class="button secondary small">+ New Video</a>
    </div>
    <div id="job-list" class="job-list">
      <p class="dash-empty" id="jobs-empty" hidden>No videos yet. <a href="/playground.html">Generate your first one →</a></p>
      <div id="jobs-loading" class="dash-loading">Loading…</div>
    </div>
  </div>
</main>

<div class="auth-gate" id="authGate" hidden>
  <p>Please <a href="/auth.html?redirect=/dashboard.html">sign in</a> to view your dashboard.</p>
</div>

<script src="./auth.js" defer></script>
<script src="./dashboard.js" defer></script>
</body>
</html>
