<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — mooncanvas</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./config.js"></script>
</head>
<body>

<header class="site-header">
  <a class="brand" href="/">
    <span class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="mb" cx="48%" cy="44%" r="56%"><stop offset="0%" stop-color="#fff9c8"/><stop offset="20%" stop-color="#f8d040"/><stop offset="48%" stop-color="#d49018"/><stop offset="75%" stop-color="#9a5008"/><stop offset="100%" stop-color="#4e2200"/></radialGradient><filter id="mg" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><clipPath id="mc"><circle cx="20" cy="20" r="18"/></clipPath></defs><circle cx="20" cy="20" r="20" fill="#b06010" opacity="0.22" filter="url(#mg)"/><circle cx="20" cy="20" r="18" fill="url(#mb)"/><path d="M8,10 C10,7 17,8 19,12 C21,16 17,20 13,18 C9,16 7,14 8,10Z" fill="rgba(50,20,0,0.4)" clip-path="url(#mc)"/><path d="M22,16 C27,13 31,17 30,22 C29,27 25,27 22,24 C20,21 19,18 22,16Z" fill="rgba(50,20,0,0.32)" clip-path="url(#mc)"/><path d="M10,24 C13,21 17,23 17,27 C17,31 13,31 11,28 C9,26 9,25 10,24Z" fill="rgba(50,20,0,0.26)" clip-path="url(#mc)"/><path d="M24,9 C27,8 30,11 29,15 C28,17 26,17 24,15 C22,13 23,10 24,9Z" fill="rgba(50,20,0,0.22)" clip-path="url(#mc)"/><circle cx="20" cy="20" r="18" fill="none" stroke="rgba(40,15,0,0.7)" stroke-width="4"/></svg>
    </span>
    <svg class="brand-name" viewBox="0 0 240 62" aria-label="mooncanvas">
      <defs>
        <path id="mc-arc" d="M4,42 C90,39 160,37 236,40"/>
        <linearGradient id="mc-gld" x1="0" y1="0" x2="240" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#b8922e"/>
          <stop offset="50%"  stop-color="#f5e49a"/>
          <stop offset="100%" stop-color="#b8922e"/>
        </linearGradient>
      </defs>
      <text font-family="'Pinyon Script', cursive" font-size="38" fill="url(#mc-gld)">
        <textPath href="#mc-arc">mooncanvas</textPath>
      </text>
    </svg>
  </a>
  <nav class="nav-links">
    <a href="/playground.html">Playground</a>
    <a href="/pricing.html">Pricing</a>
    <a href="/dashboard.html" id="nav-dashboard" class="nav-active">Dashboard</a>
    <a href="/auth.html" id="nav-signin" hidden>Sign In</a>
    <span class="nav-credits" id="nav-credits" hidden></span>
    <div id="nav-user-mount"></div>
  </nav>
</header>

<main class="dashboard-page" id="dashMain" hidden>

  <!-- Stats row -->
  <div class="dash-stats">
    <div class="stat-card">
      <span class="stat-label">Credits</span>
      <span class="stat-value" id="stat-credits">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Plan</span>
      <span class="stat-value" id="stat-plan">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Renews</span>
      <span class="stat-value" id="stat-renew">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Videos Generated</span>
      <span class="stat-value" id="stat-total">—</span>
    </div>
  </div>

  <!-- Billing actions -->
  <div class="dash-section">
    <div class="dash-section-header">
      <h2>Billing</h2>
      <div class="dash-section-actions">
        <button class="button secondary small" id="btn-upgrade" hidden>Upgrade Plan</button>
        <button class="button secondary small" id="btn-portal">Manage Subscription</button>
      </div>
    </div>
  </div>

  <!-- Job history -->
  <div class="dash-section">
    <div class="dash-section-header">
      <h2>Recent Videos</h2>
      <a href="/playground.html" class="button secondary small">+ New Video</a>
    </div>
    <div id="job-list" class="job-list">
      <p class="dash-empty" id="jobs-empty" hidden>No videos yet. <a href="/playground.html">Generate your first one →</a></p>
      <div id="jobs-loading" class="dash-loading">Loading…</div>
    </div>
  </div>
</main>

<div class="auth-gate" id="authGate" hidden>
  <p>Please <a href="/auth.html?redirect=/dashboard.html">sign in</a> to view your dashboard.</p>
</div>

<script src="./auth.js" defer></script>
<script src="./dashboard.js" defer></script>
</body>
</html>
